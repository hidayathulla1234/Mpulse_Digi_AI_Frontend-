<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Live Class — MPULSE DIGITAL AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #09090b;
      --surface: #18181b;
      --surface-card: #27272a;
      --violet: #8b5cf6;
      --violet-light: #a78bfa;
      --cyan: #06b6d4;
      --cyan-light: #22d3ee;
      --text: #f4f4f5;
      --muted: #a1a1aa;
      --border: rgba(255, 255, 255, 0.08);
      --border-strong: rgba(255, 255, 255, 0.15);
      --success: #10b981;
      --danger: #ef4444;
      --shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* HEADER */
    header {
      height: 70px;
      background: rgba(24, 24, 27, 0.8);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 3%;
      z-index: 10;
    }

    .class-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .live-badge {
      background: var(--danger);
      color: #fff;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 4px;
      animation: pulseBadge 1.8s infinite;
    }

    @keyframes pulseBadge {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    .class-title {
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      font-weight: 700;
    }

    .logo-text {
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 15px;
      color: var(--text);
    }
    .logo-text span {
      color: var(--violet);
    }

    /* LOBBY / PRE-JOIN GREEN ROOM */
    .lobby-screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      padding: 20px;
    }

    .lobby-container {
      width: 100%;
      max-width: 900px;
      display: grid;
      grid-template-columns: 1.3fr 1fr;
      gap: 50px;
      align-items: center;
    }

    .lobby-left {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .lobby-preview {
      width: 100%;
      aspect-ratio: 16/9;
      background: #121214;
      border-radius: 20px;
      border: 1px solid var(--border-strong);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow);
    }

    .lobby-preview-player {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
      transform: scaleX(-1);
    }

    .lobby-preview-controls {
      position: absolute;
      bottom: 20px;
      display: flex;
      gap: 14px;
      z-index: 5;
    }

    .lobby-preview-avatar {
      font-size: 64px;
      z-index: 1;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--violet), var(--cyan));
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lobby-right {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .lobby-right h2 {
      font-family: 'Outfit', sans-serif;
      font-size: 32px;
      font-weight: 800;
      line-height: 1.2;
    }

    .lobby-right h2 span {
      background: linear-gradient(135deg, var(--violet-light), var(--cyan-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .lobby-right p {
      color: var(--muted);
      font-size: 14.5px;
      line-height: 1.6;
    }

    .lobby-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .lobby-input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .lobby-input-group label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 700;
      color: var(--muted);
    }

    .lobby-input {
      padding: 14px 18px;
      background: var(--surface);
      border: 1px solid var(--border-strong);
      border-radius: 12px;
      color: var(--text);
      font-size: 15px;
      outline: none;
      font-family: inherit;
    }

    .lobby-input:focus {
      border-color: var(--violet);
    }

    .lobby-join-btn {
      padding: 16px;
      background: linear-gradient(135deg, var(--violet), var(--cyan));
      border: none;
      color: #fff;
      border-radius: 12px;
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(109, 40, 217, 0.35);
      transition: transform 0.2s, box-shadow 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .lobby-join-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(109, 40, 217, 0.45);
    }

    /* CLASSROOM LAYOUT */
    .classroom-container {
      flex: 1;
      display: none; /* Shown after joining */
      position: relative;
      height: calc(100vh - 70px);
    }

    /* VIDEO ZONE */
    .video-zone {
      flex: 1;
      background: #020205;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    /* VIDEO GRID */
    #video-grid {
      width: 100%;
      height: 100%;
      max-width: 1100px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 16px;
      overflow-y: auto;
      align-content: center;
      justify-content: center;
      padding: 10px;
    }

    .video-card {
      position: relative;
      background: #121214;
      border-radius: 18px;
      border: 1px solid var(--border);
      overflow: hidden;
      aspect-ratio: 16/9;
      box-shadow: var(--shadow);
      transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
    }

    .video-card.active-speaker {
      border-color: var(--cyan);
      box-shadow: 0 0 20px rgba(6, 182, 212, 0.25);
    }

    .video-card-player {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    .video-card-player video {
      object-fit: cover !important;
    }

    .video-card-name {
      position: absolute;
      bottom: 14px;
      left: 14px;
      background: rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(12px);
      color: #fff;
      padding: 5px 12px;
      border-radius: 8px;
      font-size: 12.5px;
      font-weight: 600;
      z-index: 5;
      display: flex;
      align-items: center;
      gap: 6px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .video-card-avatar {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
      background: #141416;
    }

    .video-card-avatar-inner {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--violet), var(--cyan));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      font-weight: 800;
      color: #fff;
      box-shadow: 0 8px 24px rgba(109, 40, 217, 0.3);
    }

    .video-card-muted-icon {
      position: absolute;
      top: 14px;
      right: 14px;
      background: rgba(239, 68, 68, 0.9);
      color: #fff;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      z-index: 5;
      box-shadow: 0 2px 12px rgba(239, 68, 68, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* CONTROLS BAR */
    .controls-bar {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(24, 24, 27, 0.85);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border-strong);
      border-radius: 100px;
      padding: 10px 28px;
      display: flex;
      gap: 14px;
      align-items: center;
      box-shadow: var(--shadow);
      z-index: 100;
    }

    .control-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--surface-card);
      border: 1px solid var(--border-strong);
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 19px;
      transition: all 0.2s ease;
      outline: none;
    }

    .control-btn:hover {
      background: var(--surface);
      transform: scale(1.05);
    }

    .control-btn.active {
      background: rgba(139, 92, 246, 0.25);
      border-color: var(--violet);
      color: var(--violet-light);
    }

    .control-btn.disabled {
      background: rgba(239, 68, 68, 0.2);
      border-color: var(--danger);
      color: var(--danger);
    }

    .control-btn.leave-btn {
      background: var(--danger);
      color: #fff;
      border: none;
      width: auto;
      padding: 0 24px;
      border-radius: 100px;
      font-weight: 700;
      font-size: 13.5px;
    }

    .control-btn.leave-btn:hover {
      background: #dc2626;
      transform: translateY(-2px);
    }

    /* SIDE PANEL */
    .side-panel {
      width: 360px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 5;
    }

    .panel-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
    }

    .panel-tab {
      flex: 1;
      padding: 18px;
      background: transparent;
      border: none;
      color: var(--muted);
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      text-align: center;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }

    .panel-tab.active {
      color: var(--violet-light);
      border-bottom-color: var(--violet);
      background: rgba(255, 255, 255, 0.01);
    }

    /* CHAT PANEL */
    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-messages {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .message-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
      animation: msgIn 0.3s ease-out;
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: none; }
    }

    .msg-sender {
      font-family: 'Outfit', sans-serif;
      font-size: 12px;
      font-weight: 700;
      color: var(--violet-light);
    }

    .msg-sender.teacher {
      color: var(--cyan-light);
    }

    .msg-text {
      background: var(--surface-card);
      border: 1px solid var(--border);
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 13px;
      line-height: 1.5;
      color: var(--text);
      max-width: 90%;
      word-break: break-word;
    }

    .chat-input-area {
      padding: 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }

    .chat-input {
      flex: 1;
      background: var(--surface-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    .chat-input:focus {
      border-color: var(--violet);
    }

    .chat-send-btn {
      background: var(--violet);
      color: #fff;
      border: none;
      padding: 0 18px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .chat-send-btn:hover {
      background: var(--violet-light);
    }

    /* PARTICIPANTS PANEL */
    .roster-container {
      display: none;
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      flex-direction: column;
      gap: 12px;
    }

    .roster-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: var(--surface-card);
      border: 1px solid var(--border);
      border-radius: 12px;
    }

    .roster-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--violet), var(--cyan));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 12px;
      color: #fff;
    }

    .roster-name {
      font-size: 13px;
      font-weight: 600;
    }

    .roster-role {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 100px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--muted);
    }

    .roster-role.teacher {
      background: rgba(6, 182, 212, 0.15);
      color: var(--cyan-light);
      border: 1px solid rgba(6, 182, 212, 0.2);
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="class-info">
      <div class="live-badge" id="liveBadge">LIVE</div>
      <div class="class-title" id="classTitle">Classroom: Connection Pending</div>
    </div>
    <div class="logo-text">MPULSE<span>.AI</span></div>
  </header>

  <!-- LOBBY SCREEN -->
  <div class="lobby-screen" id="lobbyScreen">
    <div class="lobby-container">
      <div class="lobby-left">
        <div class="lobby-preview">
          <div class="lobby-preview-player" id="lobbyPreviewPlayer"></div>
          <div class="lobby-preview-avatar" id="lobbyPreviewAvatar">🙋‍♂️</div>
          <div class="lobby-preview-controls">
            <button class="control-btn" id="lobbyMicBtn" onclick="toggleLobbyMic()">🎙️</button>
            <button class="control-btn" id="lobbyCamBtn" onclick="toggleLobbyCam()">📷</button>
          </div>
        </div>
      </div>
      <div class="lobby-right">
        <h2>Ready to join your <span>Interactive Classroom</span>?</h2>
        <p>Confirm your video and audio settings before joining the live session. Make sure your camera and microphone permissions are enabled.</p>
        
        <div class="lobby-form">
          <div class="lobby-input-group">
            <label for="lobbyNameInput">Your Display Name</label>
            <input type="text" class="lobby-input" id="lobbyNameInput" placeholder="Enter your full name...">
          </div>
          <button class="lobby-join-btn" onclick="requestToJoinClassroom()">
            Join Meeting 🚀
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- CLASSROOM CONTAINER -->
  <div class="classroom-container" id="classroomContainer">

    <!-- VIDEO ZONE -->
    <div class="video-zone">
      <div id="video-grid"></div>

      <!-- CONTROLS BAR -->
      <div class="controls-bar">
        <button class="control-btn" id="micBtn" onclick="toggleMic()" title="Toggle Mic">🎙️</button>
        <button class="control-btn" id="camBtn" onclick="toggleCam()" title="Toggle Camera">📷</button>
        <button class="control-btn" id="screenBtn" onclick="toggleScreenShare()" title="Share Screen">🖥️</button>
        <button class="control-btn" id="recordBtn" onclick="toggleRecording()" title="Record Class" style="display:none;">📹</button>
        <button class="control-btn leave-btn" onclick="leaveChannel()">Leave Classroom</button>
      </div>
    </div>

    <!-- SIDE PANEL -->
    <div class="side-panel">
      <div class="panel-tabs">
        <button class="panel-tab active" id="tabChat" onclick="switchPanel('chat')">Live Chat</button>
        <button class="panel-tab" id="tabRoster" onclick="switchPanel('roster')">Students (0)</button>
      </div>

      <!-- CHAT CONTAINER -->
      <div class="chat-container" id="panelChatContent">
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
          <input type="text" class="chat-input" id="chatInput" placeholder="Ask a question..." onkeydown="if(event.key==='Enter') sendMsg()">
          <button class="chat-send-btn" onclick="sendMsg()">Send</button>
        </div>
      </div>

      <!-- ROSTER CONTAINER -->
      <div class="roster-container" id="panelRosterContent"></div>
    </div>

  </div>

  <!-- AGORA SDK -->
  <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.22.0.js"></script>
  
  <!-- SCRIPT LOGIC -->
  <script>
    const BACKEND_URL = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') && (window.location.port === '5000' || window.location.port === '5501')
      ? 'http://localhost:5000'
      : 'https://mpulse-digi-ai-backend.onrender.com';
    
    // Parse URL parameters
    const params = new URLSearchParams(window.location.search);
    const channelName = params.get('channel') || 'mpulse-live';
    const role = params.get('role') || 'subscriber'; // 'publisher' (teacher) or 'subscriber' (student)
    
    document.getElementById('classTitle').textContent = `Classroom: ${channelName.toUpperCase()}`;

    // App State Variables
    let client = null;
    let localTracks = { videoTrack: null, audioTrack: null };
    let lobbyTracks = { videoTrack: null, audioTrack: null };
    let remoteUsers = {};
    
    // User name state
    let displayName = params.get('name') || '';
    let myUid = Math.floor(100000 + Math.random() * 900000);
    
    // Lobby Preview States
    let lobbyMicActive = true;
    let lobbyCamActive = true;
    
    // Classroom States
    let isMuted = false;
    let isCamOff = false;
    let isScreenSharing = false;
    let screenTrack = null;
    let mediaRecorder = null;
    let recordedChunks = [];
    let isRecording = false;
    
    // Roster / Participant name cache (UID => Name)
    let participantNameMap = {};

    // Switch Panel (Chat vs Roster)
    function switchPanel(panel) {
      document.getElementById('tabChat').classList.toggle('active', panel === 'chat');
      document.getElementById('tabRoster').classList.toggle('active', panel === 'roster');
      document.getElementById('panelChatContent').style.display = panel === 'chat' ? 'flex' : 'none';
      document.getElementById('panelRosterContent').style.display = panel === 'roster' ? 'flex' : 'none';
    }

    // Set up Lobby screen
    async function initLobby() {
      if (displayName) {
        document.getElementById('lobbyNameInput').value = displayName;
      } else {
        const localUser = JSON.parse(localStorage.getItem('currentUser') || '{}');
        if (localUser.name) {
          displayName = localUser.name;
          document.getElementById('lobbyNameInput').value = displayName;
        }
      }

      if (typeof AgoraRTC === 'undefined') {
        alert('Agora SDK failed to load. Check your internet connection.');
        return;
      }

      try {
        lobbyTracks.audioTrack = await AgoraRTC.createMicrophoneAudioTrack();
        lobbyTracks.videoTrack = await AgoraRTC.createCameraVideoTrack({ encoderConfig: '720p_1' });
        
        document.getElementById('lobbyPreviewAvatar').style.display = 'none';
        lobbyTracks.videoTrack.play('lobbyPreviewPlayer');
      } catch (err) {
        console.warn('Lobby camera preview error:', err);
        document.getElementById('lobbyPreviewAvatar').style.display = 'flex';
        lobbyCamActive = false;
        document.getElementById('lobbyCamBtn').classList.add('disabled');
        document.getElementById('lobbyCamBtn').textContent = '🚫';
      }
    }

    // Toggle Preview Microphone
    async function toggleLobbyMic() {
      if (!lobbyTracks.audioTrack) return;
      if (lobbyMicActive) {
        await lobbyTracks.audioTrack.setEnabled(false);
        lobbyMicActive = false;
        document.getElementById('lobbyMicBtn').classList.add('disabled');
        document.getElementById('lobbyMicBtn').textContent = '🔇';
      } else {
        await lobbyTracks.audioTrack.setEnabled(true);
        lobbyMicActive = true;
        document.getElementById('lobbyMicBtn').classList.remove('disabled');
        document.getElementById('lobbyMicBtn').textContent = '🎙️';
      }
    }

    // Toggle Preview Camera
    async function toggleLobbyCam() {
      if (!lobbyTracks.videoTrack) return;
      if (lobbyCamActive) {
        await lobbyTracks.videoTrack.setEnabled(false);
        lobbyCamActive = false;
        document.getElementById('lobbyCamBtn').classList.add('disabled');
        document.getElementById('lobbyCamBtn').textContent = '🚫';
        document.getElementById('lobbyPreviewAvatar').style.display = 'flex';
      } else {
        await lobbyTracks.videoTrack.setEnabled(true);
        lobbyCamActive = true;
        document.getElementById('lobbyCamBtn').classList.remove('disabled');
        document.getElementById('lobbyCamBtn').textContent = '📷';
        document.getElementById('lobbyPreviewAvatar').style.display = 'none';
      }
    }

    // Join Trigger
    async function requestToJoinClassroom() {
      const nameVal = document.getElementById('lobbyNameInput').value.trim();
      if (!nameVal) {
        alert('Please enter your display name to join.');
        return;
      }
      displayName = nameVal;

      if (lobbyTracks.videoTrack) {
        lobbyTracks.videoTrack.stop();
        lobbyTracks.videoTrack.close();
      }
      if (lobbyTracks.audioTrack) {
        lobbyTracks.audioTrack.stop();
        lobbyTracks.audioTrack.close();
      }

      document.getElementById('lobbyScreen').style.display = 'none';
      document.getElementById('classroomContainer').style.display = 'flex';

      await initClassroom();
    }

    // Classroom Chat setup
    const messages = [
      { sender: 'System', text: 'Welcome to your interactive live classroom! Everyone can turn on their camera/microphone to present and speak.', system: true }
    ];

    function renderMessages() {
      const container = document.getElementById('chatMessages');
      container.innerHTML = '';
      messages.forEach(m => {
        const item = document.createElement('div');
        item.className = 'message-item';
        
        let senderClass = '';
        if (m.teacher) senderClass = 'teacher';
        
        item.innerHTML = `
          <span class="msg-sender ${senderClass}">${m.sender}</span>
          <div class="msg-text">${m.text}</div>
        `;
        container.appendChild(item);
      });
      container.scrollTop = container.scrollHeight;
    }

    function sendMsg() {
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if (!text) return;
      
      messages.push({
        sender: displayName,
        text: text,
        teacher: role === 'publisher'
      });
      
      renderMessages();
      input.value = '';
    }

    // ─────────────────────────────────────────────────────────────
    // AGORA RTC MULTI-USER GRID INTEGRATION
    // ─────────────────────────────────────────────────────────────
    async function initClassroom() {
      renderMessages();

      try {
        const tokenRes = await fetch(`${BACKEND_URL}/api/agora-token?channelName=${channelName}&role=${role}&uid=${myUid}`);
        const tokenData = await tokenRes.json();
        
        if (tokenData.error) throw new Error(tokenData.error);
        const { token, appId } = tokenData;

        client = AgoraRTC.createClient({ mode: 'rtc', codec: 'vp8' });
        
        await fetch(`${BACKEND_URL}/api/classroom/register-name`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ channelName, uid: myUid, name: displayName, role })
        });
        
        participantNameMap[myUid] = { name: displayName, role };
        if (role === 'publisher') {
          document.getElementById('recordBtn').style.display = 'flex';
        }

        pollRosterNames();
        setInterval(pollRosterNames, 5000);

        await client.join(appId, channelName, token, myUid);
        console.log('Joined Agora RTC Room successfully! UID:', myUid);

        client.on('user-published', handleUserPublished);
        client.on('user-unpublished', handleUserUnpublished);

        localTracks.audioTrack = await AgoraRTC.createMicrophoneAudioTrack();
        localTracks.videoTrack = await AgoraRTC.createCameraVideoTrack({ encoderConfig: '720p_1' });

        createVideoCard(myUid, displayName, true);
        localTracks.videoTrack.play(`video-player-${myUid}`);

        if (!lobbyMicActive) {
          await localTracks.audioTrack.setEnabled(false);
          isMuted = true;
          document.getElementById('micBtn').classList.add('disabled');
          document.getElementById('micBtn').textContent = '🔇';
          document.getElementById(`muted-${myUid}`).style.display = 'flex';
        }
        if (!lobbyCamActive) {
          await localTracks.videoTrack.setEnabled(false);
          isCamOff = true;
          document.getElementById('camBtn').classList.add('disabled');
          document.getElementById('camBtn').textContent = '🚫';
          document.getElementById(`avatar-${myUid}`).style.display = 'flex';
        }

        await client.publish([localTracks.audioTrack, localTracks.videoTrack]);
        console.log('Local tracks published!');

      } catch (err) {
        console.error('Failed to initialize classroom:', err);
        alert('Failed to connect to Agora classroom: ' + err.message);
      }
    }

    function createVideoCard(uid, name, isMe = false) {
      const grid = document.getElementById('video-grid');
      if (document.getElementById(`video-card-${uid}`)) return;

      const card = document.createElement('div');
      card.className = 'video-card';
      card.id = `video-card-${uid}`;

      const initial = name ? name.charAt(0).toUpperCase() : '?';

      card.innerHTML = `
        <div class="video-card-player" id="video-player-${uid}"></div>
        <div class="video-card-avatar" id="avatar-${uid}" style="display: none;">
          <div class="video-card-avatar-inner">${initial}</div>
        </div>
        <div class="video-card-muted-icon" id="muted-${uid}" style="display: none;">🔇</div>
        <div class="video-card-name">
          <span>${name} ${isMe ? '(You)' : ''}</span>
        </div>
      `;

      grid.appendChild(card);
      adjustGridColumns();
    }

    function removeVideoCard(uid) {
      const card = document.getElementById(`video-card-${uid}`);
      if (card) {
        card.remove();
      }
      adjustGridColumns();
    }

    function adjustGridColumns() {
      const grid = document.getElementById('video-grid');
      const cards = grid.children.length;
      if (cards === 0) return;

      let cols = 1;
      if (cards >= 2 && cards <= 4) cols = 2;
      else if (cards > 4) cols = 3;
      
      grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
    }

    async function handleUserPublished(user, mediaType) {
      const uid = user.uid;
      await client.subscribe(user, mediaType);
      
      const pInfo = participantNameMap[uid] || { name: `User ${uid}`, role: 'student' };

      if (mediaType === 'video') {
        createVideoCard(uid, pInfo.name);
        document.getElementById(`avatar-${uid}`).style.display = 'none';
        user.videoTrack.play(`video-player-${uid}`);
      }

      if (mediaType === 'audio') {
        user.audioTrack.play();
        createVideoCard(uid, pInfo.name);
        document.getElementById(`muted-${uid}`).style.display = 'none';
      }
    }

    function handleUserUnpublished(user, mediaType) {
      const uid = user.uid;
      if (mediaType === 'video') {
        const avatar = document.getElementById(`avatar-${uid}`);
        if (avatar) avatar.style.display = 'flex';
      }
      if (mediaType === 'audio') {
        const muteIcon = document.getElementById(`muted-${uid}`);
        if (muteIcon) muteIcon.style.display = 'flex';
      }
    }

    async function toggleMic() {
      if (!localTracks.audioTrack) return;
      const mutedIcon = document.getElementById(`muted-${myUid}`);
      
      if (!isMuted) {
        await localTracks.audioTrack.setEnabled(false);
        isMuted = true;
        document.getElementById('micBtn').classList.add('disabled');
        document.getElementById('micBtn').textContent = '🔇';
        if (mutedIcon) mutedIcon.style.display = 'flex';
      } else {
        await localTracks.audioTrack.setEnabled(true);
        isMuted = false;
        document.getElementById('micBtn').classList.remove('disabled');
        document.getElementById('micBtn').textContent = '🎙️';
        if (mutedIcon) mutedIcon.style.display = 'none';
      }
    }

    async function toggleCam() {
      if (!localTracks.videoTrack) return;
      const avatar = document.getElementById(`avatar-${myUid}`);
      
      if (!isCamOff) {
        await localTracks.videoTrack.setEnabled(false);
        isCamOff = true;
        document.getElementById('camBtn').classList.add('disabled');
        document.getElementById('camBtn').textContent = '🚫';
        if (avatar) avatar.style.display = 'flex';
      } else {
        await localTracks.videoTrack.setEnabled(true);
        isCamOff = false;
        document.getElementById('camBtn').classList.remove('disabled');
        document.getElementById('camBtn').textContent = '📷';
        if (avatar) avatar.style.display = 'none';
      }
    }

    async function toggleScreenShare() {
      if (!client) return;
      const screenBtn = document.getElementById('screenBtn');
      
      try {
        if (!isScreenSharing) {
          console.log('Activating screen sharing...');
          
          screenTrack = await AgoraRTC.createScreenVideoTrack({ encoderConfig: "1080p_1" });
          screenTrack.on("track-ended", () => {
            stopScreenShare();
          });

          if (localTracks.videoTrack) {
            await client.unpublish(localTracks.videoTrack);
            localTracks.videoTrack.stop();
          }
          
          await client.publish(screenTrack);
          
          document.getElementById(`avatar-${myUid}`).style.display = 'none';
          screenTrack.play(`video-player-${myUid}`);
          
          isScreenSharing = true;
          screenBtn.classList.add('active');
          screenBtn.textContent = '⏹️';
          screenBtn.title = 'Stop Screen Share';
          
          document.getElementById('camBtn').disabled = true;
          document.getElementById('camBtn').style.opacity = 0.5;
        } else {
          await stopScreenShare();
        }
      } catch (err) {
        console.error("Screen share error:", err);
        alert("Failed to start screen share: " + err.message);
      }
    }

    async function stopScreenShare() {
      if (!isScreenSharing) return;
      const screenBtn = document.getElementById('screenBtn');
      
      try {
        if (screenTrack) {
          await client.unpublish(screenTrack);
          screenTrack.stop();
          screenTrack.close();
          screenTrack = null;
        }
        
        if (!isCamOff) {
          localTracks.videoTrack = await AgoraRTC.createCameraVideoTrack({ encoderConfig: '720p_1' });
          document.getElementById(`avatar-${myUid}`).style.display = 'none';
          localTracks.videoTrack.play(`video-player-${myUid}`);
          await client.publish(localTracks.videoTrack);
        } else {
          document.getElementById(`avatar-${myUid}`).style.display = 'flex';
        }
        
        isScreenSharing = false;
        screenBtn.classList.remove('active');
        screenBtn.textContent = '🖥️';
        screenBtn.title = 'Share Screen';
        
        document.getElementById('camBtn').disabled = false;
        document.getElementById('camBtn').style.opacity = 1;
      } catch (err) {
        console.error("Stop screen share error:", err);
      }
    }

    // Recording controls (Google Meet style local recording)
    async function startRecording() {
      try {
        console.log("Initializing local classroom recording...");
        
        // 1. Capture the meeting screen/tab video & audio (system audio)
        const screenStream = await navigator.mediaDevices.getDisplayMedia({
          video: { cursor: "always" },
          audio: true // Captures tab/system audio (includes remote students!)
        });
        
        // 2. Capture the teacher's local microphone audio
        const micStream = await navigator.mediaDevices.getUserMedia({
          audio: true
        });
        
        // 3. Mix screen audio and mic audio into one stream
        const combinedStream = new MediaStream();
        
        // Add screen video track
        combinedStream.addTrack(screenStream.getVideoTracks()[0]);
        
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const dest = audioContext.createMediaStreamDestination();
        
        const micSource = audioContext.createMediaStreamSource(micStream);
        micSource.connect(dest);
        
        if (screenStream.getAudioTracks().length > 0) {
          const screenAudioSource = audioContext.createMediaStreamSource(screenStream);
          screenAudioSource.connect(dest);
        }
        
        combinedStream.addTrack(dest.stream.getAudioTracks()[0]);
        
        // Store streams to stop them on completion
        window.recordingStreams = { screenStream, micStream, audioContext };
        
        recordedChunks = [];
        mediaRecorder = new MediaRecorder(combinedStream, { mimeType: 'video/webm' });
        
        mediaRecorder.ondataavailable = (event) => {
          if (event.data && event.data.size > 0) {
            recordedChunks.push(event.data);
          }
        };
        
        mediaRecorder.onstop = () => {
          screenStream.getTracks().forEach(t => t.stop());
          micStream.getTracks().forEach(t => t.stop());
          audioContext.close();
          
          const blob = new Blob(recordedChunks, { type: 'video/webm' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `Class_Recording_${channelName}_${Date.now()}.webm`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
          
          alert("Recording saved to your Downloads folder! You can upload this recording file inside your Student Portal Admin dashboard.");
        };
        
        mediaRecorder.start();
        isRecording = true;
        
        const recBtn = document.getElementById('recordBtn');
        recBtn.classList.add('active');
        recBtn.textContent = '⏹️';
        recBtn.title = 'Stop Recording';
        recBtn.style.color = '#ef4444';
        
      } catch (err) {
        console.error("Recording start error:", err);
        alert("Failed to start recording. Please make sure to share your screen/tab to enable screen recording.");
      }
    }

    function stopRecording() {
      if (mediaRecorder && isRecording) {
        mediaRecorder.stop();
        isRecording = false;
        
        const recBtn = document.getElementById('recordBtn');
        recBtn.classList.remove('active');
        recBtn.textContent = '📹';
        recBtn.title = 'Record Class';
        recBtn.style.color = '';
      }
    }

    function toggleRecording() {
      if (!isRecording) {
        startRecording();
      } else {
        stopRecording();
      }
    }

    async function leaveChannel() {
      stopRecording();
      if (screenTrack) {
        screenTrack.stop();
        screenTrack.close();
      }
      for (let trackName in localTracks) {
        var track = localTracks[trackName];
        if (track) {
          track.stop();
          track.close();
          localTracks[trackName] = null;
        }
      }
      if (client) {
        await client.leave();
      }
      window.location.href = role === 'publisher' ? 'admin.html' : 'student.html';
    }

    async function pollRosterNames() {
      try {
        const res = await fetch(`${BACKEND_URL}/api/classroom/names?channelName=${channelName}`);
        const data = await res.json();
        
        if (!data.mappings) return;
        
        const rosterContainer = document.getElementById('panelRosterContent');
        rosterContainer.innerHTML = '';
        
        let activeStudents = 0;

        data.mappings.forEach(m => {
          participantNameMap[m.uid] = { name: m.name, role: m.role };
          
          const nameSpan = document.querySelector(`#video-card-${m.uid} .video-card-name span`);
          if (nameSpan) {
            nameSpan.textContent = `${m.name} ${m.uid === myUid ? '(You)' : ''}`;
          }

          const isTeacher = m.role === 'publisher';
          if (!isTeacher) activeStudents++;

          const roleClass = isTeacher ? 'teacher' : '';
          const roleLabel = isTeacher ? 'Teacher' : 'Student';
          const avatarLetter = m.name.charAt(0).toUpperCase();

          rosterContainer.innerHTML += `
            <div class="roster-item">
              <div class="roster-left">
                <div class="avatar" style="${isTeacher ? 'background:var(--cyan)' : ''}">${avatarLetter}</div>
                <span class="roster-name">${m.name} ${m.uid === myUid ? '(You)' : ''}</span>
              </div>
              <span class="roster-role ${roleClass}">${roleLabel}</span>
            </div>
          `;
        });

        document.getElementById('tabRoster').textContent = `Students (${activeStudents})`;

      } catch (err) {
        console.warn('Roster poll error:', err.message);
      }
    }

    window.onload = initLobby;
  </script>
